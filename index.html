<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>СБ-1 Англи хэл</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f4f8;
            background-image: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.9)), url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 15px 35px -5px rgba(30, 64, 175, 0.15);
            padding: 30px 20px;
            border-bottom: 5px solid #b91c1c;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .usa-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #b91c1c 100%);
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
        }

        .audio-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(185, 28, 28, 0); }
            100% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0); }
        }

        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        input:focus {
            border-color: #1e40af !important;
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Нэвтрэх хэсэг -->
    <div id="loginOverlay" class="fixed inset-0 z-[2000] bg-white flex flex-col items-center justify-center p-8 overflow-y-auto">
        <div class="w-full max-w-sm text-center">
            <div class="mb-8">
                <div class="w-32 h-32 bg-slate-100 rounded-3xl mx-auto flex items-center justify-center border-4 border-blue-900 shadow-xl overflow-hidden relative">
                    <img src="logo.png" alt="СБ-1 ЛОГО" onerror="this.src='https://ui-avatars.com/api/?name=SB1&background=1e40af&color=fff&size=128'" class="w-full h-full object-cover">
                </div>
                <h1 class="mt-6 text-3xl font-black text-blue-900 tracking-tight">СБ-1 Сургууль</h1>
                <div class="flex items-center justify-center gap-2 mt-2">
                    <span class="h-[2px] w-8 bg-red-600"></span>
                    <p class="text-blue-800 font-bold text-xs uppercase tracking-[0.2em]">American English</p>
                    <span class="h-[2px] w-8 bg-red-600"></span>
                </div>
            </div>

            <div class="space-y-4">
                <input type="text" id="studentName" placeholder="Таны нэр" class="w-full p-5 bg-slate-50 border-2 border-slate-200 focus:border-blue-800 rounded-2xl outline-none font-bold text-lg transition-all text-center">
                <select id="studentClass" class="w-full p-5 bg-slate-50 border-2 border-slate-200 focus:border-blue-800 rounded-2xl outline-none font-bold text-lg transition-all text-center appearance-none cursor-pointer">
                    <option value="" disabled selected>Ангиа сонгоно уу</option>
                    <option value="7А">7А</option>
                    <option value="7Б">7Б</option>
                    <option value="7В">7В</option>
                    <option value="7Г">7Г</option>
                    <option value="7Д">7Д</option>
                </select>
                <button onclick="startApp()" class="w-full usa-gradient text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform">ЭХЛЭХ</button>
            </div>
            <p class="mt-12 text-slate-400 text-[10px] font-bold uppercase tracking-widest">🇺🇸 100 Sentences Challenge</p>
        </div>
    </div>

    <!-- Үндсэн Апп -->
    <div id="appContainer" class="hidden min-h-screen flex flex-col">
        <!-- Header -->
        <div class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b-2 border-red-100 p-4">
            <div class="max-w-2xl mx-auto flex flex-col gap-3">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl overflow-hidden border-2 border-blue-900 shadow-sm">
                            <img src="logo.png" onerror="this.src='https://ui-avatars.com/api/?name=SB1&background=1e40af&color=fff'" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <h2 id="displayStudent" class="font-black text-blue-900 text-sm leading-tight">Сурагч</h2>
                            <p id="currentStepLabel" class="text-[10px] text-red-600 font-black uppercase tracking-tighter">Асуулт 1/20</p>
                        </div>
                    </div>
                    <div class="bg-blue-900 text-white px-4 py-2 rounded-full text-xs font-black shadow-md">
                        <span id="scoreText">0/20</span>
                    </div>
                </div>
                
                <div class="px-1">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Явц</span>
                        <span id="progressPercent" class="text-[10px] font-black text-blue-700">0%</span>
                    </div>
                    <div class="progress-container">
                        <div id="progressBar" class="progress-bar-fill"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Асуултын хэсэг -->
        <div class="flex-grow flex items-center justify-center p-4">
            <div class="max-w-xl w-full" id="quizContainer">
                <!-- Ганц асуултын карт энд гарна -->
            </div>
        </div>

        <!-- Навигаци -->
        <div class="p-6 bg-white/80 backdrop-blur-sm border-t border-slate-100">
            <div class="max-w-xl mx-auto flex gap-4">
                <button id="prevBtn" onclick="prevQuestion()" class="nav-btn flex-1 bg-slate-200 text-slate-700 py-4 rounded-2xl font-black text-sm active:scale-95 transition-all flex items-center justify-center gap-2">
                    ⬅️ ӨМНӨХ
                </button>
                <button id="nextBtn" onclick="nextQuestion()" class="nav-btn flex-[2] usa-gradient text-white py-4 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    ДААРААХ ➡️
                </button>
                <button id="finishBtn" onclick="finishQuiz()" class="hidden flex-[2] bg-green-600 text-white py-4 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all">
                    🏁 ДУУСГАХ
                </button>
            </div>
        </div>
    </div>

    <!-- Үр дүнгийн Modal -->
    <div id="resultModal" class="fixed inset-0 z-[3000] bg-blue-900/90 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 usa-gradient"></div>
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-2xl font-black text-blue-900 mb-2">Баяр хүргэе!</h2>
            <p id="resultStatus" class="text-slate-500 font-bold text-sm mb-4"></p>
            
            <div class="bg-slate-50 py-6 rounded-3xl my-6 border-2 border-slate-100">
                <p class="text-slate-400 text-[10px] font-black uppercase mb-1 tracking-widest">Таны эцсийн оноо</p>
                <div class="text-6xl font-black text-blue-700" id="finalScore">0/20</div>
            </div>
            
            <div class="flex flex-col gap-3">
                <button onclick="location.reload()" class="w-full bg-blue-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Дахин эхлэх</button>
                <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-sm">Хаах</button>
            </div>
        </div>
    </div>

    <script>
        // 100 өгүүлбэрийн сан (Жишээ)
        const allLessons = [
            { id: 1, en: "I live in a modern house near the park." },
            { id: 2, en: "The comfortable sofa is in front of the window." },
            { id: 3, en: "My neighbour happily cleans the floor every morning." },
            { id: 4, en: "The plant is on the coffee table in the living room." },
            { id: 5, en: "We carefully do the washing up after dinner." },
            { id: 6, en: "Yesterday I cleaned the kitchen quickly." },
            { id: 7, en: "My sister tidied her room perfectly yesterday." },
            { id: 8, en: "We visited the museum near the library last week." },
            { id: 9, en: "He bought a bright rug for the bedroom." },
            { id: 10, en: "They watched a movie at the cinema in town." },
            { id: 11, en: "I was vacuuming the floor when my neighbour arrived." },
            { id: 12, en: "She was cooking in the kitchen while I was cleaning the bathroom." },
            { id: 13, en: "The children were playing noisily in the garden." },
            { id: 14, en: "My father was repairing the roof carefully." },
            { id: 15, en: "We were walking slowly near the park yesterday evening." },
            { id: 16, en: "Tomorrow I will redecorate my living room." },
            { id: 17, en: "We will visit the art gallery in town next week." },
            { id: 18, en: "My family will stay in a comfortable hotel." },
            { id: 19, en: "I will put the dishes in the dishwasher after dinner." },
            { id: 20, en: "They will travel quickly to the shopping centre." }
        ];

        // 100 хүртэл нөхөх (Test)
        for (let i = allLessons.length + 1; i <= 100; i++) {
            allLessons.push({ id: i, en: `Sentence number ${i} for listening practice.` });
        }

        let selectedLessons = [];
        let currentIndex = 0;
        let userAnswers = []; // Хариултуудыг хадгалах {value, isCorrect}

        function startApp() {
            const name = document.getElementById('studentName').value.trim();
            const cls = document.getElementById('studentClass').value;
            if(!name || !cls) return;
            
            // Санамсаргүй 20-ийг сонгоод холих
            selectedLessons = shuffleArray([...allLessons]).slice(0, 20);
            selectedLessons = shuffleArray(selectedLessons);
            
            // Хоосон хариултуудаар дүүргэх
            userAnswers = new Array(selectedLessons.length).fill(null).map(() => ({ value: "", isCorrect: null }));

            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('hidden');
            document.getElementById('displayStudent').textContent = `${name} (${cls})`;
            
            showQuestion(0);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showQuestion(index) {
            currentIndex = index;
            const item = selectedLessons[index];
            const container = document.getElementById('quizContainer');
            const answerData = userAnswers[index];
            
            container.innerHTML = `
                <div class="app-card">
                    <div class="text-center mb-8">
                        <span class="inline-block px-4 py-1 bg-red-50 text-red-600 rounded-full text-[10px] font-black uppercase tracking-widest mb-4">Task ${index + 1}</span>
                        <h3 class="text-xl font-black text-blue-900">Сонсоод бичнэ үү</h3>
                    </div>

                    <button onclick="playAudio(${item.id}, this)" class="w-full usa-gradient text-white py-6 rounded-2xl font-black flex items-center justify-center gap-3 active:scale-95 transition-all shadow-xl shadow-blue-100 mb-8">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                        АУДИО СОНСОХ
                    </button>

                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Таны хариулт:</label>
                        <input type="text" id="currentInput" 
                               value="${answerData.value}"
                               placeholder="Type what you hear..." 
                               class="w-full p-5 bg-slate-50 border-2 ${answerData.isCorrect === true ? 'border-green-500' : (answerData.isCorrect === false ? 'border-red-500' : 'border-slate-100')} rounded-2xl font-bold outline-none transition-all text-lg"
                               oninput="saveAnswer(this.value)">
                        <div id="feedbackBox" class="min-h-[50px]">
                            ${answerData.isCorrect !== null ? renderFeedback(answerData.isCorrect, item.en) : ''}
                        </div>
                    </div>
                </div>
            `;

            updateNavButtons();
            updateProgress();
            
            // Хэрэв өмнө нь бөглөөгүй байсан бол input дээр фокус өгөх
            if(answerData.value === "") {
                setTimeout(() => document.getElementById('currentInput').focus(), 100);
            }
        }

        function saveAnswer(val) {
            userAnswers[currentIndex].value = val;
            // Бичиж байх үед автоматаар шалгахгүй, Enter дарах эсвэл Дараах товч дээр шалгана
        }

        function checkCurrentAnswer() {
            const input = document.getElementById('currentInput');
            const item = selectedLessons[currentIndex];
            const val = input.value.trim();
            
            if(!val) return true; // Хоосон бол зүгээр л алгасах

            const userVal = val.toLowerCase().replace(/[.!?]/g, '');
            const correctVal = item.en.toLowerCase().replace(/[.!?]/g, '');
            
            const isCorrect = userVal === correctVal;
            userAnswers[currentIndex].isCorrect = isCorrect;
            
            // UI шинэчлэх
            input.classList.remove('border-slate-100', 'border-green-500', 'border-red-500');
            input.classList.add(isCorrect ? 'border-green-500' : 'border-red-500');
            document.getElementById('feedbackBox').innerHTML = renderFeedback(isCorrect, item.en);
            
            updateScore();
            return true;
        }

        function renderFeedback(isCorrect, correct) {
            if(isCorrect) {
                return `<p class="text-xs font-black p-4 rounded-xl bg-green-50 text-green-700 animate-bounce mt-2">✅ ГАЙХАЛТАЙ! Зөв байна.</p>`;
            } else {
                return `<div class="mt-2 p-4 rounded-xl bg-red-50 text-red-700">
                            <p class="text-[10px] font-black uppercase opacity-60">Зөв хариулт:</p>
                            <p class="text-xs font-black">${correct}</p>
                        </div>`;
            }
        }

        function nextQuestion() {
            checkCurrentAnswer();
            if(currentIndex < selectedLessons.length - 1) {
                showQuestion(currentIndex + 1);
            }
        }

        function prevQuestion() {
            if(currentIndex > 0) {
                showQuestion(currentIndex - 1);
            }
        }

        function updateNavButtons() {
            const isLast = currentIndex === selectedLessons.length - 1;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').classList.toggle('hidden', isLast);
            document.getElementById('finishBtn').classList.toggle('hidden', !isLast);
            document.getElementById('currentStepLabel').textContent = `Асуулт ${currentIndex + 1}/${selectedLessons.length}`;
        }

        function updateProgress() {
            // Хэдэн асуултанд хариулсан бэ (хоосон биш)
            const answeredCount = userAnswers.filter(a => a.value.trim() !== "").length;
            const percent = Math.round((answeredCount / selectedLessons.length) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';
        }

        function updateScore() {
            const correct = userAnswers.filter(a => a.isCorrect === true).length;
            document.getElementById('scoreText').textContent = `${correct}/${selectedLessons.length}`;
        }

        function playAudio(id, btn) {
            btn.classList.add('audio-pulse');
            const audio = new Audio(`${id}.mp3`);
            audio.play().catch(() => btn.classList.remove('audio-pulse'));
            audio.onended = () => btn.classList.remove('audio-pulse');
        }

        function finishQuiz() {
            checkCurrentAnswer();
            const correct = userAnswers.filter(a => a.isCorrect === true).length;
            document.getElementById('finalScore').textContent = `${correct}/${selectedLessons.length}`;
            document.getElementById('resultStatus').textContent = `Та нийт 20 асуултаас ${correct}-д нь зөв хариуллаа.`;
            document.getElementById('resultModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('resultModal').classList.add('hidden');
        }
    </script>
</body>
</html>
