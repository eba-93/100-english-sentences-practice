    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Lexend:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Lexend', sans-serif; 
            touch-action: manipulation;
            background-color: #f0f4f8;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .header-font { font-family: 'Fredoka One', cursive; }
        .card-pop { border: 4px solid #1e293b; box-shadow: 8px 8px 0px #1e293b; }
        .btn-pop { border: 3px solid #1e293b; box-shadow: 4px 4px 0px #1e293b; transition: all 0.1s ease; }
        .btn-pop:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #1e293b; }

        .step-circle {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-weight: 900; font-size: 14px; border: 2px solid #1e293b;
            transition: all 0.3s ease;
        }

        .step-pending { background: white; color: #1e293b; }
        .step-current { background: #3b82f6; color: white; border-color: #1d4ed8; transform: scale(1.1); }
        .step-correct { background: #22c55e; color: white; border-color: #15803d; }
        .step-wrong { background: #ef4444; color: white; border-color: #b91c1c; }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .modal-overlay.active {
            display: flex;
        }

        .arial-font { font-family: Arial, Helvetica, sans-serif !important; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'listening-app-v2';

        window.db = db;
        window.auth = auth;
        window.appId = appId;
        window.firestore = { collection, addDoc, onSnapshot, serverTimestamp, query };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            window.state.user = user;
            if (user && window.state.view === 'admin') {
                window.fetchResults();
            }
        });

        initAuth();
    </script>

            document.getElementById('modal').classList.remove('active'); 
            if (window.state.isTerminated) {
                window.state.view = 'result';
                render();
            }
        }
        
        function openAdminModal() { document.getElementById('admin-modal').classList.add('active'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.remove('active'); }

        function submitAdminPass() {
            const passInp = document.getElementById('admin-pass');
            if (passInp.value === "89062622") {
                window.state.view = 'admin';
                closeAdminModal();
                passInp.value = "";
                render();
                window.fetchResults();
            } else {
                showModal("Нууц код буруу байна!");
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && window.state.view === 'exercise') {
                window.state.warnings++;
                if (window.state.warnings === 1) {
                    showModal("САНУУЛГА: Таб солихыг хориглоно! Дахин шилжвэл шалгалт шууд дуусна.");
                } else if (window.state.warnings >= 2) {
                    window.state.isTerminated = true;
                    saveResult(true);
                }
            }
        });

        window.fetchResults = function() {
            if (!window.db || !window.state.user) return;
            window.state.isLoadingResults = true;
            if (window.state.resultsUnsubscribe) window.state.resultsUnsubscribe();
            
            const resultsRef = window.firestore.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'results');
            window.state.resultsUnsubscribe = window.firestore.onSnapshot(resultsRef, (snapshot) => {
                window.state.adminData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                window.state.isLoadingResults = false;
                if (window.state.view === 'admin') render();
            }, (error) => {
                console.error("Firestore error:", error);
                window.state.isLoadingResults = false;
            });
        };

        function normalizeText(text) {
            return text.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").replace(/\s{2,}/g, " ").trim();
        }

        function render() {
            const main = document.getElementById('main-content');
            const actions = document.getElementById('header-actions');
            const s = window.state;

            if (s.view === 'login') {
                actions.innerHTML = `<button onclick="openAdminModal()" class="text-xs font-bold text-slate-400 border-2 border-slate-200 px-2 py-1 rounded-lg">Admin</button>`;
                main.innerHTML = `
                    <div class="bg-white p-8 rounded-[2.5rem] card-pop text-center">
                        <div class="mb-6 floating text-6xl">🎒</div>
                        <h2 class="header-font text-2xl mb-8 uppercase text-slate-800 tracking-tighter">Тавтай морил</h2>
                        <div class="space-y-6">
                            <input id="stu-name" class="w-full p-5 border-4 border-slate-800 rounded-2xl font-bold outline-none" placeholder="Чиний нэр..." value="${s.name}">
                            <select id="stu-grade" class="w-full p-5 border-4 border-slate-800 rounded-2xl font-black outline-none bg-white">
                                ${['7А', '7Б', '7В', '7Г', '7Д'].map(g => `<option value="${g}" ${s.grade === g ? 'selected' : ''}>${g} анги</option>`).join('')}
                            </select>
                            <button onclick="startQuiz()" class="w-full bg-yellow-400 py-6 rounded-2xl font-black text-xl btn-pop uppercase text-slate-800">Эхлэх 🚀</button>
                        </div>
                    </div>`;
            } else if (s.view === 'exercise') {
                const current = s.quizSet[s.currentIndex];
                actions.innerHTML = `<span class="text-xs font-bold bg-yellow-100 text-yellow-700 px-2 py-1 rounded-lg">Хяналт идэвхтэй</span>`;
                
                let progressHtml = `<div class="flex flex-wrap justify-center gap-2 mb-8">`;
                for(let i=0; i<15; i++) {
                    let cls = 'step-pending';
                    if (i === s.currentIndex) cls = 'step-current';
                    else if (s.answers[i]) cls = s.answers[i].correct ? 'step-correct' : 'step-wrong';
                    progressHtml += `<div class="step-circle ${cls}">${i+1}</div>`;
                }
                progressHtml += `</div>`;

                main.innerHTML = `
                    <div class="bg-white p-6 rounded-[2.5rem] card-pop text-center">
                        ${progressHtml}
                        <p class="text-lg font-bold mb-4 text-slate-600">
                            ${current.type === 'english' ? 'Сонсоод англиар бичнэ үү:' : 'Сонсоод зөв орчуулгыг сонгоно уу:'}
                        </p>
                        
                        ${!s.showFeedback ? `
                            <button onclick="playAudio()" class="w-20 h-20 bg-red-500 text-white rounded-full mx-auto border-4 border-slate-800 shadow-[4px_4px_0px_#1e293b] mb-6 flex items-center justify-center active:scale-95 transition-transform">
                                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
                            </button>
                            
                            ${current.type === 'english' ? `
                                <input id="ans-input" class="w-full p-4 text-center text-xl font-black border-4 border-slate-800 rounded-2xl mb-4 outline-none" placeholder="Хариулт..." onkeydown="if(event.key==='Enter') checkAnswer(this.value)" autocomplete="off">
                                <button onclick="checkAnswer(document.getElementById('ans-input').value)" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black btn-pop uppercase">Шалгах ✅</button>
                            ` : `
                                <div class="space-y-3">
                                    ${current.options.map(opt => `
                                        <button onclick="checkAnswer('${opt.replace(/'/g, "\\'")}')" class="w-full p-4 text-left font-bold border-4 border-slate-800 rounded-2xl bg-white hover:bg-slate-50 transition-colors btn-pop">
                                            ${opt}
                                        </button>
                                    `).join('')}
                                </div>
                            `}
                        ` : `
                            <div class="p-6 rounded-3xl border-4 ${s.currentResult.correct ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'} mb-8 text-left">
                                <div class="text-2xl font-black mb-2 ${s.currentResult.correct ? 'text-green-700' : 'text-red-700'}">${s.currentResult.correct ? 'Зөв! ✅' : 'Буруу! ❌'}</div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Зөв хариулт:</p>
                                <p class="font-black text-lg text-slate-800 tracking-tight">${current.type === 'english' ? current.en : current.mn}</p>
                            </div>
                            <button onclick="goNext()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black btn-pop uppercase">${s.currentIndex < 14 ? 'Дараагийнх ➜' : 'Дуусгах 🏁'}</button>
                        `}
                    </div>`;
                if (!s.showFeedback && current.type === 'english') setTimeout(() => document.getElementById('ans-input')?.focus(), 200);
            } else if (s.view === 'result') {
                const score = s.answers.filter(a => a && a.correct).length;
                const timeStr = s.finishTime ? s.finishTime.toLocaleString('mn-MN') : new Date().toLocaleString('mn-MN');
                main.innerHTML = `
                    <div id="result-view" class="bg-white p-10 rounded-[2.5rem] card-pop text-center arial-font">
                        <div class="text-5xl mb-4">${s.isTerminated ? '⚠️' : '🎉'}</div>
                        <h2 class="text-3xl mb-4 uppercase text-slate-800 font-bold tracking-tight">${s.isTerminated ? 'Шалгалт зогссон' : 'Сайн байна, ' + s.name + '!'}</h2>
                        <div class="text-7xl font-black text-blue-600 mb-6">${score}/15</div>
                        <div class="space-y-4 mb-8">
                            <div class="bg-slate-50 p-5 rounded-[2rem] border-2 border-slate-100 flex flex-col items-center">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-1">Сурагчийн нэр</p>
                                <p class="text-2xl font-black text-slate-800">${s.name}</p>
                            </div>
                            <div class="bg-slate-50 p-5 rounded-[2rem] border-2 border-slate-100 flex flex-col items-center">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-1">Дууссан хугацаа</p>
                                <p class="text-md font-bold text-slate-700">${timeStr}</p>
                            </div>
                        </div>
                        <button onclick="location.reload()" class="w-full py-6 bg-slate-900 text-white rounded-2xl font-bold btn-pop uppercase">Дахин эхлэх</button>
                    </div>`;
            } else if (s.view === 'admin') {
                actions.innerHTML = `<button onclick="window.state.view='login'; render()" class="text-xs font-bold text-blue-600 border-2 border-blue-100 px-3 py-1 rounded-lg">Гарах</button>`;
                main.innerHTML = `
                    <div class="bg-white p-6 rounded-[2rem] card-pop h-[80vh] flex flex-col">
                        <h2 class="header-font text-xl mb-6 uppercase text-center text-slate-800 tracking-tighter">Хяналтын самбар</h2>
                        <div class="overflow-y-auto flex-grow custom-scrollbar space-y-4 pr-1">
                            ${s.isLoadingResults ? `
                                <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                                    <div class="animate-spin mb-4 text-3xl">⌛</div>
                                    <p class="font-bold italic">Мэдээлэл ачаалж байна...</p>
                                </div>` : 
                                (s.adminData.length === 0 ? `
                                <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                                    <p class="font-bold italic">Одоогоор шалгалт өгсөн сурагч алга.</p>
                                </div>` : 
                                s.adminData.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)).map(res => `
                                <div class="p-4 ${res.isTerminated ? 'bg-red-50 border-red-300' : 'bg-slate-50 border-slate-800'} rounded-2xl border-2 flex justify-between items-center">
                                    <div class="overflow-hidden">
                                        <div class="font-black text-slate-800 truncate">${res.name} ${res.isTerminated ? '<span class="text-[10px] bg-red-500 text-white px-2 py-0.5 rounded ml-1">ЗӨРЧИЛ</span>' : ''}</div>
                                        <div class="text-[10px] text-slate-500 font-bold uppercase">${res.grade} • ${res.timestamp ? new Date(res.timestamp.seconds * 1000).toLocaleString('mn-MN', {hour: '2-digit', minute:'2-digit'}) : '...'}</div>
                                    </div>
                                    <div class="text-2xl font-black ml-4 shrink-0 ${res.score >= 12 ? 'text-green-500' : 'text-blue-500'}">${res.score}/15</div>
                                </div>`).join(''))}
                        </div>
                    </div>`;
            }
        }

        function startQuiz() {
            const nameInp = document.getElementById('stu-name');
            const gradeInp = document.getElementById('stu-grade');
            if (!nameInp.value.trim()) return showModal("Нэрээ оруулна уу!");
            
            window.state.name = nameInp.value.trim();
            window.state.grade = gradeInp.value;
            window.state.warnings = 0;
            window.state.isTerminated = false;
            window.state.finishTime = null;

            const shuffled = [...SENTENCE_DATA].sort(() => Math.random() - 0.5);
            const selected15 = shuffled.slice(0, 15);

            window.state.quizSet = selected15.map((item, idx) => {
                const type = idx < 8 ? 'english' : 'mongolian';
                let options = [];
                if (type === 'mongolian') {
                    const others = SENTENCE_DATA.filter(s => s.id !== item.id).sort(() => Math.random() - 0.5).slice(0, 2);
                    options = [item.mn, ...others.map(o => o.mn)].sort(() => Math.random() - 0.5);
                }
                return { ...item, type, options };
            });

            window.state.currentIndex = 0;
            window.state.answers = [];
            window.state.showFeedback = false;
            window.state.view = 'exercise';
            render();
        }

        function playAudio() {
            const currentQuestion = window.state.quizSet[window.state.currentIndex];
            const audioId = currentQuestion.id; 
            const audio = new Audio(`${audioId}.mp3`);
            
            audio.play().catch(err => {
                console.error("Audio error:", err);
                showModal(`${audioId}.mp3 аудио файл олдсонгүй!`, "📁");
            });
        }

        function checkAnswer(val) {
            if (!val.trim() || window.state.showFeedback) return;
            const current = window.state.quizSet[window.state.currentIndex];
            const isCorrect = normalizeText(current.type === 'english' ? current.en : current.mn) === normalizeText(val);
            window.state.currentResult = { correct: isCorrect, studentAns: val.trim() };
            window.state.answers[window.state.currentIndex] = window.state.currentResult;
            window.state.showFeedback = true;
            render();
        }

        function goNext() {
            if (window.state.currentIndex < 14) {
                window.state.currentIndex++;
                window.state.showFeedback = false;
                render();
            } else {
                saveResult(false);
            }
        }

        async function saveResult(isTerminated = false) {
            window.state.finishTime = new Date();
            window.state.isTerminated = isTerminated;
            
            window.state.view = 'result';
            render();

            if (!window.state.user || !window.db) return;

            const score = window.state.answers.filter(a => a && a.correct).length;
            const data = {
                name: window.state.name,
                grade: window.state.grade,
                score: score,
                isTerminated: isTerminated,
                timestamp: window.firestore.serverTimestamp(),
                uid: window.state.user.uid
            };
            
            try {
                const coll = window.firestore.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'results');
                await window.firestore.addDoc(coll, data);
            } catch (e) { 
                console.error("Firebase save failed:", e); 
            }
        }

        window.onload = render;
    </script>
</body>
</html>
