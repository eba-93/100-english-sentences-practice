<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Listening Challenge!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Lexend:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Lexend', sans-serif; 
            touch-action: manipulation;
            background-color: #f0f4f8;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .header-font { font-family: 'Fredoka One', cursive; }

        .usa-uk-gradient {
            background: linear-gradient(135deg, #e63946 0%, #ffffff 50%, #457b9d 100%);
        }

        .card-pop {
            border: 4px solid #1e293b;
            box-shadow: 8px 8px 0px #1e293b;
        }

        .btn-pop {
            border: 3px solid #1e293b;
            box-shadow: 4px 4px 0px #1e293b;
            transition: all 0.1s ease;
        }

        .btn-pop:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #1e293b;
        }

        .step-circle {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 900;
            font-size: 14px;
            border: 2px solid #1e293b;
            transition: all 0.3s ease;
        }

        .step-pending { background: white; color: #1e293b; }
        .step-current { background: #3b82f6; color: white; border-color: #1d4ed8; transform: scale(1.1); }
        .step-correct { background: #22c55e; color: white; border-color: #15803d; }
        .step-wrong { background: #ef4444; color: white; border-color: #b91c1c; }

        input:focus { font-size: 16px !important; }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'listening-exercise-001';

        window.db = db;
        window.appId = appId;
        
        signInAnonymously(auth).catch(console.error);
    </script>
</head>
<body class="min-h-screen">

    <div id="app" class="max-w-xl mx-auto min-h-screen flex flex-col p-4">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl border-4 border-slate-800 shadow-[4px_4px_0px_#1e293b]">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🇺🇸</span>
                <h1 class="header-font text-xl text-slate-800 tracking-wider">SUPER LISTENING</h1>
                <span class="text-2xl">🇬🇧</span>
            </div>
            <div id="header-actions"></div>
        </header>
        <div id="main-content" class="flex-grow flex flex-col justify-center"></div>
    </div>

    <!-- Modals -->
    <div id="modal" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center z-[100] p-6 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] border-4 border-slate-800 p-8 max-w-sm w-full shadow-[8px_8px_0px_#1e293b] text-center">
            <div class="text-4xl mb-4">⚠️</div>
            <h3 class="header-font text-xl mb-4 text-slate-800 uppercase">Attention!</h3>
            <p id="modal-msg" class="mb-6 text-slate-600 font-bold"></p>
            <button onclick="closeModal()" class="w-full bg-yellow-400 text-slate-800 py-4 rounded-2xl font-black border-4 border-slate-800 shadow-[4px_4px_0px_#1e293b] active:translate-y-1 active:shadow-none transition-all">OK!</button>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center z-[90] p-6 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] border-4 border-slate-800 p-8 max-w-sm w-full shadow-[8px_8px_0px_#1e293b]">
            <h3 class="header-font text-xl mb-6 text-center text-slate-800 uppercase tracking-widest">Teacher Login</h3>
            <input type="password" id="admin-pass" class="w-full p-4 bg-slate-50 border-4 border-slate-800 rounded-2xl mb-4 outline-none font-bold" placeholder="Enter Secret Code">
            <div class="flex gap-3">
                <button onclick="closeAdminModal()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold border-2 border-slate-300">Cancel</button>
                <button onclick="submitAdminPass()" class="flex-1 bg-blue-500 text-white py-4 rounded-2xl font-bold border-4 border-slate-800 shadow-[4px_4px_0px_#1e293b]">Login</button>
            </div>
        </div>
    </div>

    <script>
        const SENTENCE_DATA = [
            { id: 1, en: "I live in a modern house near the park.", mn: "Би цэцэрлэгт хүрээлэнгийн ойролцоо орчин үеийн байшинд амьдардаг." },
            { id: 2, en: "The comfortable sofa is in front of the window.", mn: "Тухтай буйдан цонхны өмнө байна." },
            { id: 3, en: "My neighbour happily cleans the floor every morning.", mn: "Миний хөрш өглөө бүр шалаа баяртайгаар цэвэрлэдэг." },
            { id: 4, en: "The plant is on the coffee table in the living room.", mn: "Ургамал зочны өрөөний кофены ширээн дээр байна." },
            { id: 5, en: "We carefully do the washing up after dinner.", mn: "Бид оройн хоолны дараа аяга тавгаа болгоомжтой угаадаг." },
            { id: 6, en: "Yesterday I cleaned the kitchen quickly.", mn: "Өчигдөр би гал тогоогоо хурдан цэвэрлэсэн." },
            { id: 7, en: "My sister tidied her room perfectly yesterday.", mn: "Миний дүү өчигдөр өрөөгөө маш сайн цэгцэлсэн." },
            { id: 8, en: "We visited the museum near the library last week.", mn: "Бид өнгөрсөн долоо хоногт номын сангийн ойролцоох музейд зочилсон." },
            { id: 9, en: "He bought a bright rug for the bedroom.", mn: "Тэр унтлагын өрөөндөө тод өнгөтэй хивс худалдаж авсан." },
            { id: 10, en: "They watched a movie at the cinema in town.", mn: "Тэд хотын кино театрт кино үзсэн." },
            { id: 11, en: "I was vacuuming the floor when my neighbour arrived.", mn: "Хөрш маань ирэх үед би шалаа тоос соруулж байсан." },
            { id: 12, en: "She was cooking in the kitchen while I was cleaning the bathroom.", mn: "Намайг угаалгын өрөө цэвэрлэж байх хооронд тэр гал тогоонд хоол хийж байсан." },
            { id: 13, en: "The children were playing noisily in the garden.", mn: "Хүүхдүүд цэцэрлэгт дуу шуутай тоглож байсан." },
            { id: 14, en: "My father was repairing the roof carefully.", mn: "Аав маань дээврийг анхааралтай засаж байсан." },
            { id: 15, en: "We were walking slowly near the park yesterday evening.", mn: "Өчигдөр орой бид цэцэрлэгт хүрээлэнгийн ойролцоо алгуурхан алхаж байсан." },
            { id: 16, en: "Tomorrow I will redecorate my living room.", mn: "Маргааш би зочны өрөөгөө дахин засна." },
            { id: 17, en: "We will visit the art gallery in town next week.", mn: "Бид ирэх долоо хоногт хотын уран зургийн галерейд зочилно." },
            { id: 18, en: "My family will stay in a comfortable hotel.", mn: "Манай гэр бүл тухтай зочид буудалд байрлана." },
            { id: 19, en: "I will put the dishes in the dishwasher after dinner.", mn: "Би оройн хоолны дараа аяга тавгаа аяга угаагчинд хийнэ." },
            { id: 20, en: "They will travel quickly to the shopping centre.", mn: "Тэд худалдааны төв рүү хурдан явах болно." }
            // ... Жагсаалтыг үргэлжлүүлж болно
        ];

        const ADMIN_CODE = "89062622$@";

        let state = {
            view: 'login',
            name: '',
            grade: '7А',
            quizSet: [],
            currentIndex: 0,
            answers: [],
            warnings: 0,
            adminData: [],
            showFeedback: false,
            currentResult: null
        };

        function showModal(msg) {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        function openAdminModal() {
            document.getElementById('admin-modal').classList.remove('hidden');
            document.getElementById('admin-modal').classList.add('flex');
        }

        function closeAdminModal() {
            document.getElementById('admin-modal').classList.add('hidden');
            document.getElementById('admin-modal').classList.remove('flex');
        }

        function submitAdminPass() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === ADMIN_CODE) {
                state.view = 'admin';
                closeAdminModal();
                fetchResults();
                render();
            } else {
                showModal("Багшийн код буруу байна!");
            }
        }

        async function fetchResults() {
            const resultsRef = window.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'results');
            window.onSnapshot(resultsRef, (snapshot) => {
                state.adminData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (state.view === 'admin') render();
            });
        }

        function getFeedback(score, name) {
            if (score === 15) return `WOW! Гайхалтай, ${name}! 🌟 Чи бүх асуултанд "Perfect" хариуллаа. Англи хэлний мастер байна!`;
            if (score >= 12) return `Маш сайн, ${name}! 🚀 Чи үнэхээр мундаг сонсголтой юм. Ингээд хичээвэл чи удахгүй төрөлх хэл шигээ ярих нь ээ!`;
            if (score >= 8) return `Сайн байна, ${name}! 👍 Чиний хариултууд дажгүй байлаа. Дараагийн удаа "Challenge"-ээ илүү сайн хийгээрэй!`;
            return `Зүгээр ээ, ${name}! 💪 Хэл сурах бол марафон л гэсэн үг. Өдөр бүр жаахан давтахад чи удахгүй "Pro" болно!`;
        }

        function normalizeText(text) {
            // Цэг таслал, тусгай тэмдэгтүүдийг арилгаж, жижиг үсгээр хувиргана
            return text.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").replace(/\s{2,}/g, " ").trim();
        }

        function render() {
            const main = document.getElementById('main-content');
            const actions = document.getElementById('header-actions');

            if (state.view === 'login') {
                actions.innerHTML = `<button onclick="openAdminModal()" class="text-xs font-black text-slate-400 border-2 border-slate-200 px-2 py-1 rounded-lg uppercase tracking-widest">Admin</button>`;
                main.innerHTML = `
                    <div class="bg-white p-8 rounded-[2.5rem] card-pop text-center">
                        <div class="mb-6 floating">
                            <span class="text-6xl">🎒</span>
                        </div>
                        <h2 class="header-font text-2xl mb-8 text-slate-800 uppercase tracking-tighter">Welcome Student!</h2>
                        <div class="space-y-6">
                            <div class="text-left">
                                <label class="header-font text-xs text-blue-500 mb-2 px-2 uppercase tracking-widest block">What is your name?</label>
                                <input id="stu-name" type="text" class="w-full p-5 bg-slate-50 border-4 border-slate-800 rounded-2xl outline-none focus:bg-white transition-all font-bold text-slate-700" placeholder="Type your name here..." value="${state.name}">
                            </div>
                            <div class="text-left">
                                <label class="header-font text-xs text-red-500 mb-2 px-2 uppercase tracking-widest block">Select your Class</label>
                                <select id="stu-grade" class="w-full p-5 bg-slate-50 border-4 border-slate-800 rounded-2xl outline-none font-black appearance-none text-slate-700">
                                    ${['7А', '7Б', '7в', '7Г', '7Д'].map(g => `<option value="${g}" ${state.grade === g ? 'selected' : ''}>Class ${g}</option>`).join('')}
                                </select>
                            </div>
                            <button onclick="startQuiz()" class="w-full bg-yellow-400 text-slate-900 py-6 rounded-2xl font-black text-xl btn-pop uppercase tracking-widest mt-4">Let's Go! 🚀</button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'exercise') {
                const current = state.quizSet[state.currentIndex];
                actions.innerHTML = `<button onclick="state.view='login'; render()" class="text-xs font-black text-red-500 border-2 border-red-200 px-3 py-1 rounded-lg uppercase">Quit</button>`;
                
                let progressHtml = `<div class="flex flex-wrap justify-center gap-2 mb-8 p-2">`;
                for(let i=0; i<15; i++) {
                    let statusClass = 'step-pending';
                    if (i === state.currentIndex) statusClass = 'step-current';
                    else if (state.answers[i]) {
                        statusClass = state.answers[i].correct ? 'step-correct' : 'step-wrong';
                    }
                    progressHtml += `<div class="step-circle ${statusClass}">${i+1}</div>`;
                }
                progressHtml += `</div>`;

                main.innerHTML = `
                    <div class="bg-white p-6 md:p-8 rounded-[2.5rem] card-pop text-center relative overflow-hidden">
                        ${progressHtml}

                        <div class="mb-8">
                            <div class="inline-block p-4 bg-yellow-100 rounded-2xl border-2 border-yellow-300 text-yellow-800 text-sm font-bold uppercase mb-4 tracking-wider">
                                🎧 Question ${state.currentIndex + 1}
                            </div>
                            <p class="text-lg font-bold text-slate-600 italic">
                                ${current.type === 'english' ? 'Write exactly what you hear in English:' : 'Translate the sentence into Mongolian:'}
                            </p>
                        </div>
                        
                        ${!state.showFeedback ? `
                            <button onclick="playAudio()" class="w-28 h-28 bg-red-500 text-white rounded-full flex items-center justify-center mx-auto border-4 border-slate-800 shadow-[4px_4px_0px_#1e293b] active:translate-y-1 active:shadow-none transition-all mb-8 group">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                                </svg>
                            </button>
                            <div class="space-y-4">
                                <input id="ans-input" type="text" class="w-full p-5 text-center text-xl font-black border-4 border-slate-800 rounded-2xl outline-none bg-slate-50 focus:bg-white transition-all placeholder:text-slate-300" placeholder="Type answer..." autocomplete="off" onkeydown="if(event.key==='Enter') checkAnswer(this.value)">
                                <button onclick="checkAnswer(document.getElementById('ans-input').value)" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black btn-pop uppercase tracking-widest text-lg">Check Answer ✅</button>
                            </div>
                        ` : `
                            <div class="p-6 rounded-3xl border-4 ${state.currentResult.correct ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'} mb-8">
                                <div class="text-4xl mb-2">${state.currentResult.correct ? '✅' : '❌'}</div>
                                <h4 class="font-black uppercase tracking-widest mb-2 ${state.currentResult.correct ? 'text-green-700' : 'text-red-700'}">${state.currentResult.correct ? 'Correct!' : 'Wrong Answer!'}</h4>
                                <div class="text-left space-y-2 mt-4">
                                    <p class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Correct Answer:</p>
                                    <p class="font-black text-slate-800 text-lg">${current.type === 'english' ? current.en : current.mn}</p>
                                    ${!state.currentResult.correct ? `
                                        <p class="text-xs font-bold text-slate-400 uppercase tracking-tighter mt-2">Your Answer:</p>
                                        <p class="font-bold text-red-600 italic">${state.currentResult.studentAns || '(Empty)'}</p>
                                    ` : ''}
                                </div>
                            </div>
                            <button onclick="goNext()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black btn-pop uppercase tracking-widest text-lg">Next One ➜</button>
                        `}
                    </div>
                `;
                if (!state.showFeedback) setTimeout(() => document.getElementById('ans-input').focus(), 100);
            } else if (state.view === 'result') {
                const score = state.answers.filter(a => a && a.correct).length;
                const feedback = getFeedback(score, state.name);
                main.innerHTML = `
                    <div class="bg-white p-10 rounded-[2.5rem] card-pop text-center overflow-hidden relative">
                        <div class="absolute top-0 left-0 w-full h-2 usa-uk-gradient"></div>
                        
                        <div class="w-32 h-32 bg-yellow-400 rounded-full flex items-center justify-center mx-auto mb-8 border-4 border-slate-800 shadow-[4px_4px_0px_#1e293b] floating">
                            <span class="text-4xl font-black text-slate-800">${score}/15</span>
                        </div>
                        
                        <h2 class="header-font text-3xl mb-4 text-slate-800 uppercase italic">Great Job!</h2>
                        
                        <div class="p-6 bg-slate-50 rounded-3xl border-2 border-slate-200 mb-10">
                            <p class="text-slate-700 text-lg leading-relaxed font-bold">
                                ${feedback}
                            </p>
                        </div>
                        
                        <button onclick="state.view='login'; render()" class="w-full py-6 bg-slate-900 text-white rounded-2xl font-black btn-pop uppercase tracking-widest text-lg">Back to Start</button>
                    </div>
                `;
            } else if (state.view === 'admin') {
                actions.innerHTML = `<button onclick="state.view='login'; render()" class="text-xs font-black text-blue-600 border-2 border-blue-200 px-3 py-1 rounded-lg uppercase">Back</button>`;
                main.innerHTML = `
                    <div class="bg-white p-6 rounded-[2rem] card-pop h-[80vh] flex flex-col">
                        <div class="flex items-center gap-3 mb-6">
                            <span class="text-3xl">👨‍🏫</span>
                            <h2 class="header-font text-xl text-slate-800 uppercase">Results Dashboard</h2>
                        </div>
                        
                        <div class="overflow-y-auto flex-grow pr-2 custom-scrollbar">
                            <div class="space-y-4">
                                ${state.adminData.sort((a,b) => b.timestamp - a.timestamp).map(res => `
                                    <div class="p-5 bg-slate-50 rounded-2xl border-2 border-slate-800 flex justify-between items-center shadow-[4px_4px_0px_#cbd5e1]">
                                        <div>
                                            <div class="font-black text-slate-800 text-lg">${res.name}</div>
                                            <div class="flex items-center gap-2">
                                                <span class="bg-blue-100 text-blue-700 text-[10px] font-black px-2 py-0.5 rounded border border-blue-200 uppercase">${res.grade}</span>
                                                <span class="text-[10px] font-bold text-slate-400">${res.timestamp ? new Date(res.timestamp.seconds * 1000).toLocaleTimeString() : ''}</span>
                                            </div>
                                        </div>
                                        <div class="text-right">
                                            <div class="text-2xl font-black ${res.score >= 12 ? 'text-green-500' : 'text-blue-500'}">${res.score}/15</div>
                                            ${res.terminated ? '<span class="text-[9px] font-black bg-red-500 text-white px-2 py-1 rounded-full uppercase italic">Terminated</span>' : '<span class="text-[9px] font-black bg-green-500 text-white px-2 py-1 rounded-full uppercase italic">Finished</span>'}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function startQuiz() {
            state.name = document.getElementById('stu-name').value;
            state.grade = document.getElementById('stu-grade').value;
            if (!state.name.trim()) { showModal("Please enter your name first!"); return; }

            // Randomly pick 15 items
            const shuffled = [...SENTENCE_DATA].sort(() => 0.5 - Math.random());
            const selection = shuffled.slice(0, 15);
            
            state.quizSet = selection.map((item, idx) => ({
                ...item,
                type: idx < 8 ? 'english' : 'mongolian' // 8 English transcription, 7 translation
            })).sort(() => 0.5 - Math.random());

            state.currentIndex = 0;
            state.answers = [];
            state.warnings = 0;
            state.showFeedback = false;
            state.view = 'exercise';
            render();
        }

        function playAudio() {
            const audioId = state.quizSet[state.currentIndex].id;
            const audio = new Audio(`${audioId}.mp3`);
            audio.play().catch(err => {
                showModal(`Файл олдсонгүй: ${audioId}.mp3`);
            });
        }

        function checkAnswer(val) {
            if (!val.trim()) return;
            
            const current = state.quizSet[state.currentIndex];
            const correctText = normalizeText(current.type === 'english' ? current.en : current.mn);
            const studentText = normalizeText(val);
            const isCorrect = correctText === studentText;

            state.currentResult = {
                correct: isCorrect,
                studentAns: val.trim()
            };
            state.answers[state.currentIndex] = state.currentResult;
            state.showFeedback = true;
            render();
        }

        function goNext() {
            state.showFeedback = false;
            state.currentResult = null;
            if (state.currentIndex < 14) {
                state.currentIndex++;
                render();
            } else {
                saveResult(false);
            }
        }

        async function saveResult(terminated) {
            const score = state.answers.filter(a => a && a.correct).length;
            const resData = {
                name: state.name,
                grade: state.grade,
                score: score,
                total: 15,
                terminated: terminated,
                warnings: state.warnings,
                timestamp: window.serverTimestamp ? window.serverTimestamp() : new Date()
            };

            try {
                const coll = window.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'results');
                await window.addDoc(coll, resData);
            } catch (e) { console.error(e); }

            state.view = 'result';
            render();
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && state.view === 'exercise') {
                state.warnings++;
                if (state.warnings === 1) {
                    showModal("STOP! 🛑 Цонх шилжүүлэх хориотой шүү!");
                } else if (state.warnings >= 2) {
                    saveResult(true);
                }
            }
        });

        window.onload = () => {
            import("https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js").then(m => {
                window.collection = m.collection;
                window.addDoc = m.addDoc;
                window.onSnapshot = m.onSnapshot;
                window.query = m.query;
                window.serverTimestamp = m.serverTimestamp;
                render();
            });
        };
    </script>
</body>
</html>
